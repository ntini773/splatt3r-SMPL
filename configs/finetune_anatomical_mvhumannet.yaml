# ==========================================================
# Anatomical Refinement Fine-Tuning Configuration
# ==========================================================
# Inherits the heavy Splatt3R baseline settings, but overrides 
# parameters specific to GCN cross-attention fine-tuning.
include: ['main.yaml']

# Define custom save folder for finetuning results
save_dir: '/ssd_scratch/gnrs/results_finetune_anatomical/${name}/'

# Checkpoint from base Splatt3R to initialize the DPT heads & PixelSplat decoder
# IMPORTANT: Provide the full absolute path to the .ckpt file!
splatt3r_checkpoint_path: '/ssd_scratch/gnrs/checkpoints/epoch=19-step=1200.ckpt'

# Loggers — Turn on wandb for full production runs
loggers:
  use_wandb: True
  use_csv_logger: True

data:
  # Base dataset root containing 'main/', 'depth/', 'normal/', 'anchors/'
  root: '/ssd_scratch/gnrs/mvhumannet++_10demo'
  
  # Sequences:
  # - null means auto-discover all sequences inside root/main/
  # - or supply a list like ['100831', '100832']
  sequences: ['100831', '100832', '100833', '100834', '100835', '100836', '100837', '100838']
  
  resolution: [512, 512]
  batch_size: 1          # Increase if your multi-GPU setup has VRAM overhead
  num_workers: 4          # Match CPUS per GPU
  num_target_views: 2     # Limit target views to reduce memory usage
  
  # How many loops over the small dataset per 1 logical "epoch". 
  # Helps avoid PyTorch Lightning overhead for tiny datasets.
  epochs_per_train_epoch: 10

opt:
  # 30-epoch full run
  epochs: 30
  
  # Base LR. (Remember: Gaussian DPT automatically uses 0.1x of this!)
  lr: 0.00002
  # gradient accumulation: effective batch = batch_size * 2 gpus * accumulate
  # Reduce to 2 if still OOM; current 4 is safe with the normal-skip fix.
  # Hint: Set PYTORCH_CUDA_ALLOC_CONF=max_split_size_mb:128 to prevent fragmentation.
  accumulate_grad_batches: 8

loss:
  mse_loss_weight: 1.0
  lpips_loss_weight: 0.5

  
  # ── Background Weight Schedule ───────────────────────────────────────────
  # Three-zone soft mask:
  #   Zone 1: Inner eroded human (intersection of geom+silhouette, then eroded) → weight 1.0
  #   Zone 2: Boundary ring (silhouette minus eroded core)                       → boundary_weight (fixed, never decays)
  #   Zone 3: Background (outside silhouette)                                    → background_weight (decays, floored)
  #
  # background_weight decays linearly from initial → bg_weight_floor over bg_schedule_end_epoch epochs.
  # Gated: decay doesn't begin until train/psnr >= bg_schedule_psnr_gate.
  background_weight: 0.1
  bg_weight_floor: 0.05        # never let background go below this (prevents opacity collapse)
  boundary_weight: 0.3          # fixed weight for the human boundary ring (mask imperfection buffer)
  bg_schedule_end_epoch: 20    # background weight reaches floor at epoch 20 (out of 30)
  bg_schedule_psnr_gate: 7.0   # don't start decay until PSNR >= 7 dB

  apply_mask: True
  average_over_mask: True
