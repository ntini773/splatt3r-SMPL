name: '%Y-%m-%d-%H-%M-%S'

save_dir: './results/${name}/'

# Environment
seed: 0
devices: 'auto'

# Loggers
use_profiler: False
loggers:
  use_csv_logger: True
  use_wandb: True

# Model
use_pretrained: True
pretrained_mast3r_path: './checkpoints/MASt3R_ViTLarge_BaseDecoder_512_catmlpdpt_metric.pth'

# Data
data:
  root: '/home/bras5602/data/scannetpp'
  batch_size: 12
  num_workers: 16
  resolution: [512, 512]
  epochs_per_train_epoch: 100 # How many times to sample from each scene each training epoch (helps avoid unnecessary Pytorch Lightning overhead)

# Optimization
opt:
  epochs: 20
  lr: 0.00001
  weight_decay: 0.05
  gradient_clip_val: 0.5

loss:
  mse_loss_weight: 1.0
  lpips_loss_weight: 0.25
  mast3r_loss_weight: Null
  apply_mask: True
  average_over_mask: True

use_offsets: True
sh_degree: 1

# ========== SMPL-X Configuration ==========
# Enable SMPL-X head for human body reconstruction
smplx_enabled: True

# Path to downloaded SMPL-X model (download from https://github.com/vchoutas/smplx)
# Directory should contain: SMPLX_NEUTRAL.npz, etc.
smplx_model_path: './models/smplx/SMPLX_NEUTRAL.npz'

# SMPL-X Head Architecture
smplx_hidden_dim: 512      # Hidden dimension for MLP layers
smplx_num_layers: 2        # Number of MLP layers in the head

# Loss weights for SMPL-X terms
lambda_smplx_pose: 1.0        # Weight for pose parameter regression
lambda_smplx_shape: 0.1       # Weight for shape (beta) parameters
lambda_smplx_joints: 1.0      # Weight for joint position loss (MPJPE)
lambda_smplx_expr: 0.1        # Weight for expression coefficients
lambda_smplx_verts: 0.0       # Weight for per-vertex loss (0 = disabled)